<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Shopify Demo</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-dark-green: #006400;
            --ios-dark-red: #8b0000;
            --ios-gray: #8e8e93;
            --ios-bg: #f2f2f7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--ios-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            color: #000;
        }

        .card { 
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            padding: 30px 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 88%; 
            max-width: 360px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #paywallScreen {
            display: none;
            background: #ffffff;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .app-icon { border-radius: 20%; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { font-weight: 700; font-size: 24px; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub-text { color: var(--ios-gray); margin-top: 10px; font-size: 16px; max-width: 280px; line-height: 1.4; }

        .setup-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--ios-gray); margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }

        button { border: none; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 16px; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; }
        .btn-start { background: var(--ios-dark-green); }
        .btn-stop { background: var(--ios-dark-red); }
        .btn-buy { background: #000; margin-top: 25px; width: 80%; }
        
        #status { margin-top: 20px; font-weight: 600; font-size: 14px; color: var(--ios-gray); }
    </style>
</head>
<body>

    <div id="appScreen" class="card">
        <img src="icon.png" width="60" height="60" class="app-icon">
        <h2>Shopify Demo</h2>
        <div class="setup-group">
            <label>Store Display Name</label>
            <input type="text" id="storeNameInput" placeholder="Online Store">
            <label>Interval (seconds)</label>
            <input type="number" id="intervalInput" value="2">
        </div>
        <button class="btn-start" onclick="startSysteem()">Start Notifications</button>
        <button class="btn-stop" onclick="stopSysteem()">Stop Notifications</button>
        <div id="status">Status: Idle</div>
    </div>

    <div id="paywallScreen">
        <img src="icon.png" width="80" height="80" class="app-icon">
        <h2>Shopify Demo</h2>
        <p class="sub-text">You have used your free demo.</p>
        <p class="sub-text" style="font-size: 14px;">To get infinite notifications, please buy the subscription.</p>
        <button class="btn-buy" onclick="window.location.reload()">Get Subscription</button>
    </div>

    <script>
        let audio = new Audio('kaching.mp3');
        let orderNumber = Math.floor(Math.random() * 5000) + 1000;
        let timer = null;
        const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

        window.onload = function() {
            // Als de app op het beginscherm staat OF al eerder gebruikt is, toon paywall
            if (localStorage.getItem('demoUsed') === 'true' || isStandalone) {
                showPaywall();
            }
        };

        function showPaywall() {
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('paywallScreen').style.display = 'flex';
            document.body.style.background = '#ffffff';
        }

        function startSysteem() {
            if (localStorage.getItem('demoUsed') === 'true') {
                showPaywall();
                return;
            }

            if (timer !== null) return;
            
            const statusDiv = document.getElementById('status');
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    statusDiv.innerText = "Status: Running";
                    statusDiv.style.color = "var(--ios-dark-green)";
                    sendNotification();
                    timer = setInterval(sendNotification, document.getElementById('intervalInput').value * 1000);
                    
                    // Toon de instructie in het Engels
                    if (!isStandalone) {
                        setTimeout(() => {
                            alert("⚠️ TRIAL ACTIVE\n\nWhen on iOS: To keep notifications running in the background, you must 'Add to Home Screen'.\n\n1. Tap the Share button\n2. Select 'Add to Home Screen'");
                        }, 1000);
                    }
                }
            });
        }

        function stopSysteem() {
            if (timer === null) return;
            clearInterval(timer);
            timer = null;
            
            // Zodra ze stoppen, is de demo officieel voorbij
            localStorage.setItem('demoUsed', 'true');
            showPaywall();
        }

        function sendNotification() {
            let storeName = document.getElementById('storeNameInput').value.trim() || "Online Store";
            const bodyText = "€29.95, 1 item from Online Store • " + storeName;

            new Notification("⚠️DEMO Order #" + orderNumber, { 
                body: bodyText, 
                icon: "icon.png" 
            });
            
            audio.play().catch(e => {});
            orderNumber++;
        }
    </script>
</body>
</html>
